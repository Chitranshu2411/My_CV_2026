<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.getElementById('runtime-error-overlay');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'runtime-error-overlay';
          errDiv.style.position = 'fixed';
          errDiv.style.top = '0';
          errDiv.style.left = '0';
          errDiv.style.width = '100%';
          errDiv.style.backgroundColor = '#7f1d1d';
          errDiv.style.color = '#fecaca';
          errDiv.style.zIndex = '999999';
          errDiv.style.padding = '24px';
          errDiv.style.fontFamily = 'monospace';
          errDiv.style.borderBottom = '4px solid #b91c1c';
          errDiv.style.overflow = 'auto';
          errDiv.style.maxHeight = '50vh';
          document.body.appendChild(errDiv);
        }
        errDiv.innerHTML = '<h2>🚨 Client-side Runtime Error</h2>' +
                           '<p><strong>Message:</strong> ' + e.message + '</p>' +
                           '<p><strong>Source:</strong> ' + e.filename + ':' + e.lineno + ':' + e.colno + '</p>' +
                           (e.error && e.error.stack ? '<pre style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 4px; font-size: 12px; margin-top: 12px; white-space: pre-wrap;">' + e.error.stack + '</pre>' : '');
      });
    </script>
    <title>Chitranshu Yadav | AI Full Stack & Backend Engineer</title>
    <meta name="description" content="Chitranshu Yadav - AI-focused Java Full Stack Engineer & Distributed Systems Backend Developer. Explore projects, experience, achievements, and tech stack." />
    <meta name="keywords" content="Chitranshu Yadav, Full Stack Developer, Java, Spring Boot, Spring AI, React, Kubernetes, AI Engineer, Bhopal, Software Engineer" />
  </head>
  <body class="bg-black text-slate-100 antialiased selection:bg-purple-600 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
